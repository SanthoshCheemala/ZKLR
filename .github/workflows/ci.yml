name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (incl. tamper matrix)
        run: go test ./... -count=1 -timeout=25m
